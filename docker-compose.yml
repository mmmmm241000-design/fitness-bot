# FitCoach Bot - docker-compose.yml
version: '3.8'

services:
  fitness-bot:
    build: .
    container_name: fitness-coach-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DATABASE_PATH=data/fitness.db
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('data/fitness.db')"]
      interval: 30s
      timeout: 10s
      retries: 3
