# FitCoach Bot - Render Blueprint
# Auto-deploys to Render.com

services:
  - type: web
    name: fitness-bot
    env: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      mkdir -p data logs config
      python bot/main.py

    healthCheckPath: /

    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        value: https://me-fitness.openai.azure.com
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o-mini
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-02-15
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: data/fitness.db
      - key: LOG_LEVEL
        value: INFO
